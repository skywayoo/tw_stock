name: Cron - 每日報告

on:
  schedule:
    - cron: '40 5 * * 1-5'  # 台灣時間 13:40，週一到五（收盤後）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily-report cron
        run: |
          STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://twstock-rose.vercel.app/api/cron/daily-report)
          echo "HTTP $STATUS"
          cat /tmp/resp.txt
          [ "$STATUS" = "200" ] || exit 1
