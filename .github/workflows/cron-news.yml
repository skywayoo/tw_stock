name: Cron - 新聞監測

on:
  schedule:
    - cron: '*/10 * * * 1-5'  # 每10分鐘，週一到五
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call news cron
        run: |
          STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://twstock-rose.vercel.app/api/cron/news)
          echo "HTTP $STATUS"
          cat /tmp/resp.txt
          [ "$STATUS" = "200" ] || exit 1
